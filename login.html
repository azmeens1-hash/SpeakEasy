<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login | SpeakEasy</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Poppins:wght@400;500;600;700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link rel="shortcut icon" href="favicon.svg"/>

<style>


:root {
  --primary:     #6c3fc5;
  --secondary:   #c8993a;
  --accent:      #9b6de8;
  --gradient:    linear-gradient(135deg, #6c3fc5 0%, #c8993a 100%);
  --bg:          #faf7f2;
  --bg-section:  #f3ede3;
  --bg-card:     #ffffff;
  --ink:         #1a1207;
  --text-main:   #2e2416;
  --text-light:  #6b5a47;
  --gray:        #9e8a76;
  --border:      rgba(108,63,197,0.15);
  --border-a:    rgba(108,63,197,0.30);
  --accent-soft: rgba(108,63,197,0.08);
  --shadow-sm:   0 2px 8px rgba(108,63,197,0.08);
  --shadow-md:   0 8px 32px rgba(108,63,197,0.14);
  --shadow-lg:   0 20px 60px rgba(108,63,197,0.2);
}
body.dark {
  --primary:     #9b6de8;
  --secondary:   #e8b84b;
  --accent:      #c4a0f5;
  --gradient:    linear-gradient(135deg, #7c52d4 0%, #d4a83a 100%);
  --bg:          #0d0e1a;
  --bg-section:  #13152a;
  --bg-card:     #1a1d35;
  --ink:         #eeeaf8;
  --text-main:   #ddd8f5;
  --text-light:  #a89fcc;
  --gray:        #7a7499;
  --border:      rgba(155,109,232,0.2);
  --border-a:    rgba(155,109,232,0.40);
  --accent-soft: rgba(155,109,232,0.10);
  --shadow-sm:   0 2px 8px rgba(0,0,0,0.35);
  --shadow-md:   0 8px 32px rgba(0,0,0,0.45);
  --shadow-lg:   0 20px 60px rgba(0,0,0,0.55);
}


*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  animation: none !important;
  animation-duration: 0s !important;
  animation-delay: 0s !important;
  transition: none !important;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text-main);
}
body[dir="rtl"] { direction: rtl; }
a { text-decoration: none; color: inherit; }


.auth-page {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 60% 55% at 50% 45%,
      rgba(108,63,197,0.07) 0%, transparent 70%);
}
body.dark .auth-page {
  background-image:
    radial-gradient(ellipse 60% 55% at 50% 45%,
      rgba(155,109,232,0.10) 0%, transparent 70%);
}


.ctrl-row {
  position: fixed;
  top: 16px; right: 16px;
  display: flex; gap: 8px; z-index: 999;
}
body[dir="rtl"] .ctrl-row { right: auto; left: 16px; }

.ctrl-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  color: var(--ink);
  font-size: 0.85rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-sm);
  font-family: 'Poppins', sans-serif; font-weight: 700; padding: 0;
}
.ctrl-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
.ctrl-btn i { font-size: 13px; }


.auth-card {
  width: 100%;
  max-width: 420px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 28px;
  
  padding: 28px 36px 26px;
  box-shadow: var(--shadow-lg);
  position: relative;
 
  overflow: hidden;
}


.auth-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 4px;
  background: var(--gradient);
  border-radius: 28px 28px 0 0;
}


.auth-logo {
  font-family: 'Poppins', sans-serif;
  font-size: 1.4rem; font-weight: 900;
  color: var(--ink); text-align: center;
  margin-bottom: 4px; display: block;
  cursor: pointer;
  text-decoration: none;
}
.auth-logo span { color: var(--primary); }
.auth-logo:hover span { opacity: 0.8; }

.auth-subtitle {
  text-align: center; color: var(--gray);
  font-size: 0.82rem; margin-bottom: 10px;
}


.auth-lang-badge {
  display: flex; justify-content: center;
  gap: 6px; margin-bottom: 10px; flex-wrap: wrap;
}
.lang-flag { font-size: 1.2rem; }


.auth-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem; font-weight: 900;
  color: var(--primary); text-align: center;
  margin-bottom: 16px;
}


.auth-social {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 14px;
}
.auth-social-btn {
  display: flex; align-items: center; justify-content: center; gap: 7px;
  padding: 9px 10px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  background: var(--bg-card);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem; font-weight: 600; cursor: pointer;
}
.auth-social-btn:hover { border-color: var(--border-a); }
.auth-social-btn.google:hover { border-color: #4285F4; }
.auth-social-btn.apple:hover  { border-color: var(--ink); }
.g-logo { width: 15px; height: 15px; flex-shrink: 0; }


.auth-divider {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 14px;
}
.auth-divider::before, .auth-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.auth-divider span { font-size: 0.74rem; color: var(--gray); white-space: nowrap; }


.auth-field { margin-bottom: 12px; }
.auth-field label {
  display: block; font-size: 0.78rem; font-weight: 600;
  color: var(--text-main); margin-bottom: 5px;
}
.auth-field .input-wrap { position: relative; }
.auth-field .input-wrap i {
  position: absolute; left: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--gray); font-size: 12px; pointer-events: none;
}
body[dir="rtl"] .auth-field .input-wrap i { left: auto; right: 14px; }

.auth-field input {
  width: 100%;
  padding: 10px 12px 10px 38px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  background: var(--bg); color: var(--text-main);
  font-family: 'DM Sans', sans-serif; font-size: 0.87rem;
  outline: none; box-sizing: border-box;
}
body[dir="rtl"] .auth-field input { padding: 10px 38px 10px 12px; text-align: right; }
.auth-field input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.auth-field input::placeholder { color: var(--gray); }


.auth-forgot {
  display: block; text-align: right;
  font-size: 0.78rem; color: var(--primary);
  margin-top: -6px; margin-bottom: 14px; cursor: pointer;
}
body[dir="rtl"] .auth-forgot { text-align: left; }


.auth-btn {
  width: 100%; padding: 12px;
  background: var(--gradient); color: #fff;
  border: none; border-radius: 40px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.92rem; font-weight: 700; cursor: pointer;
  box-shadow: var(--shadow-md);
  display: flex; align-items: center; justify-content: center; gap: 7px;
  margin-bottom: 14px;
}
.auth-btn:hover { opacity: 0.92; }


.auth-switch { text-align: center; font-size: 0.83rem; color: var(--gray); }
.auth-switch a { color: var(--primary); font-weight: 600; cursor: pointer; }


@media (max-width: 480px) {
  .auth-card    { padding: 24px 18px 20px; border-radius: 20px; }
  .auth-title   { font-size: 1.4rem; }
  .auth-social  { grid-template-columns: 1fr; gap: 8px; }
  .ctrl-row     { top: 12px; right: 12px; gap: 6px; }
  .ctrl-btn     { width: 36px; height: 36px; font-size: 0.75rem; }
  body[dir="rtl"] .ctrl-row { right: auto; left: 12px; }
}
</style>
</head>
<body>


<div class="ctrl-row">
  <button class="ctrl-btn" id="rtlToggle" title="Toggle RTL/LTR">
    <i class="fas fa-exchange-alt"></i>
  </button>
  <button class="ctrl-btn" id="themeToggle" title="Toggle theme">🌙</button>
</div>


<div class="auth-page">
  <div class="auth-card">

    <a href="index.html" class="auth-logo">Speak<span>Easy</span></a>
    <p class="auth-subtitle">Your World, Every Language</p>

    <div class="auth-lang-badge">
      <span class="lang-flag">🇪🇸</span>
      <span class="lang-flag">🇫🇷</span>
      <span class="lang-flag">🇯🇵</span>
      <span class="lang-flag">🇩🇪</span>
      <span class="lang-flag">🇮🇳</span>
    </div>

    <h2 class="auth-title">Welcome Back</h2>

  
    <div class="auth-social">

      <button class="auth-social-btn google" onclick="socialLogin('Google')">
        <svg class="g-logo" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.017 17.64 11.71 17.64 9.2z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Google
      </button>

      <button class="auth-social-btn apple" onclick="socialLogin('Apple')">
        <svg width="14" height="14" viewBox="0 0 814 1000" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">
          <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 483.9 35.9 332.8 84.6 220.9c28.4-63.4 79.2-109.2 140.4-109.2s95.9 40.8 164 40.8 100.8-40.8 176-40.8c57.6 0 119 30.1 157.6 81.1zm-220.8-107.8c31.4-37.6 54.2-89.9 54.2-142.2 0-7.1-.6-14.3-1.9-20.1-51.5 2-112.3 34.5-148.8 75.8-28.5 32.4-55.1 83.8-55.1 136.8 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 46.5 0 102.5-30.7 136.1-69.7z" fill="currentColor"/>
        </svg>
        Apple
      </button>

    </div>

    <div class="auth-divider"><span>or continue with email</span></div>

    <div class="auth-field">
      <label>Email Address</label>
      <div class="input-wrap">
        <i class="fas fa-envelope"></i>
        <input type="email" placeholder="you@example.com"/>
      </div>
    </div>

    <div class="auth-field">
      <label>Password</label>
      <div class="input-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" placeholder="Enter your password"/>
      </div>
    </div>

    <a href="#" class="auth-forgot">Forgot password?</a>

    <button class="auth-btn">
      <i class="fas fa-sign-in-alt"></i> Sign In
    </button>

    <p class="auth-switch">
      Don't have an account? <a href="signup.html">Sign up free</a>
    </p>

  </div>
</div>

<script>
(function () {
  'use strict';

  var MOON      = '🌙';
  var SUN       = '☀️';
  var THEME_KEY = 'speakeasy-theme';
  var RTL_KEY   = 'speakeasy-rtl';

 
  function isDark() { return document.body.classList.contains('dark'); }

  function syncTheme(dark) {
    var btn = document.getElementById('themeToggle');
    if (btn) {
      btn.textContent = dark ? SUN : MOON;
      btn.title = dark ? 'Switch to light mode' : 'Switch to dark mode';
    }
  }

  function setTheme(dark) {
    document.body.classList.toggle('dark', dark);
    syncTheme(dark);
    try { localStorage.setItem(THEME_KEY, dark ? 'dark' : 'light'); } catch (e) {}
  }

  (function () {
    var s = null;
    try { s = localStorage.getItem(THEME_KEY); } catch (e) {}
    if (!s) s = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    setTheme(s === 'dark');
  })();

  document.getElementById('themeToggle').addEventListener('click', function (e) {
    e.stopPropagation(); setTheme(!isDark());
  });

  function isRTL() { return document.body.getAttribute('dir') === 'rtl'; }

  function setRTL(rtl) {
    document.documentElement.dir = rtl ? 'rtl' : 'ltr';
    document.body.setAttribute('dir', rtl ? 'rtl' : 'ltr');
    var btn = document.getElementById('rtlToggle');
    if (btn) btn.title = rtl ? 'Switch to LTR' : 'Switch to RTL';
    try { localStorage.setItem(RTL_KEY, rtl ? 'rtl' : 'ltr'); } catch (e) {}
  }

  (function () {
    var s = null;
    try { s = localStorage.getItem(RTL_KEY); } catch (e) {}
    if (s === 'rtl') setRTL(true);
  })();

  document.getElementById('rtlToggle').addEventListener('click', function (e) {
    e.stopPropagation(); setRTL(!isRTL());
  });

  window.socialLogin = function (provider) {
    alert('Redirecting to ' + provider + ' OAuth…\n(Wire up your handler here.)');
  };

})();
</script>
</body>
</html>
