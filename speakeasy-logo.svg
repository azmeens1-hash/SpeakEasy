<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 130" width="480" height="130">
  <title>SpeakEasy Language Academy logo</title>
  <desc>A small purple globe icon with black grid lines and white continent shapes, next to a large, clearly legible SpeakEasy Language Academy wordmark.</desc>

