<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign Up | SpeakEasy</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Poppins:wght@400;500;600;700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link rel="shortcut icon" href="favicon.svg"/>
<style>


:root {
  --primary:     #6c3fc5;
  --secondary:   #1a1207;
  --accent:      #9b6de8;
  --gradient:    linear-gradient(135deg, #6c3fc5 0%, #1a1207 100%);
  --bg:          #ffffff;
  --bg-section:  #f7f7f8;
  --bg-card:     #ffffff;
  --ink:         #1a1207;
  --text-main:   #2e2416;
  --text-light:  #6b5a47;
  --gray:        #9e8a76;
  --border:      rgba(108,63,197,0.15);
  --border-a:    rgba(108,63,197,0.30);
  --accent-soft: rgba(108,63,197,0.08);
  --shadow-sm:   0 2px 8px rgba(108,63,197,0.08);
  --shadow-md:   0 8px 32px rgba(108,63,197,0.14);
  --shadow-lg:   0 20px 60px rgba(108,63,197,0.2);
}
body.dark {
  --primary:    #6c3fc5;
  --secondary: #eeeaf8;
  --accent:       #1c1a1e;
  --gradient:    linear-gradient(135deg, #7c52d4 0%, #1a1207 100%);
  --bg:          #0a0a0a;
  --bg-section:  #1a1a1a;
  --bg-card:     #222222;
  --ink:         #eeeaf8;
  --text-main:   #ddd8f5;
  --text-light:  #a89fcc;
  --gray:        #7a7499;
  --border:      rgba(155,109,232,0.2);
  --border-a:    rgba(155,109,232,0.40);
  --accent-soft: rgba(155,109,232,0.10);
  --shadow-sm:   0 2px 8px rgba(0,0,0,0.35);
  --shadow-md:   0 8px 32px rgba(0,0,0,0.45);
  --shadow-lg:   0 20px 60px rgba(0,0,0,0.55);
}


*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  animation: none !important;
  animation-duration: 0s !important;
  animation-delay: 0s !important;
  transition: none !important;
}


html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text-main);
}
body[dir="rtl"] { direction: rtl; }
a { text-decoration: none; color: inherit; }


.auth-page {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 60% 55% at 50% 45%,
      rgba(108,63,197,0.07) 0%, transparent 70%);
}
body.dark .auth-page {
  background-image:
    radial-gradient(ellipse 60% 55% at 50% 45%,
      rgba(155,109,232,0.10) 0%, transparent 70%);
}


.ctrl-row {
  position: fixed;
  top: 16px; right: 16px;
  display: flex; gap: 8px; z-index: 999;
}
body[dir="rtl"] .ctrl-row { right: auto; left: 16px; }

/* theme + rtl toggles — same shape/behaviour as dashboard.html */
.theme-toggle {
  width:38px; height:38px; min-width:38px; border-radius:50%;
  border:1.5px solid var(--border); background:var(--primary); color:#fff;
  font-size:1.05rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
  padding:0;
}
.theme-toggle:hover { background:var(--gradient); }

.rtl-toggle {
  width:38px; height:38px; min-width:38px; border-radius:50%;
  border:1.5px solid var(--border-a); background:var(--primary); color:#fff;
  font-family:'DM Sans',sans-serif; font-size:.7rem; font-weight:700;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  padding:0;
}
.rtl-toggle:hover { background:var(--gradient); }
body[dir="rtl"] .rtl-toggle { background:var(--gradient); }


.auth-card {
  width: 100%;
  max-width: 440px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 26px 36px 22px;
  box-shadow: var(--shadow-lg);
  position: relative;
  overflow: hidden;
}
.auth-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 4px;
  background: var(--gradient);
  border-radius: 28px 28px 0 0;
}


.auth-logo {
  font-family: 'Poppins', sans-serif;
  font-size: 1.4rem; font-weight: 700;
  color: var(--primary); text-align: center;
  margin-bottom: 3px; display: block;
  cursor: pointer;
  text-decoration: none;
}
.auth-logo span { color: var(--ink); }
.auth-logo:hover span { opacity: 0.8; }

.auth-subtitle {
  text-align: center; color: var(--gray);
  font-size: 0.8rem; margin-bottom: 10px;
}


.auth-perks {
  display: flex; justify-content: center;
  gap: 8px; margin-bottom: 10px; flex-wrap: wrap;
}
.perk-chip {
  display: flex; align-items: center; gap: 5px;
  background: var(--accent-soft);
  color: var(--primary);
  font-size: 0.7rem; font-weight: 600;
  padding: 4px 10px; border-radius: 20px;
  border: 1px solid var(--border-a);
}


.auth-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.55rem; font-weight: 900;
  color: var(--primary); text-align: center;
  margin-bottom: 14px;
}


.auth-row {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px;
}


.auth-field { margin-bottom: 11px; }
.auth-field label {
  display: block; font-size: 0.76rem; font-weight: 600;
  color: var(--text-main); margin-bottom: 4px;
}

.auth-field input,
.auth-field select {
  width: 100%;
  padding: 10px 13px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  background: var(--bg); color: var(--text-main);
  font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
  outline: none; box-sizing: border-box;
  appearance: none;
}
body[dir="rtl"] .auth-field input,
body[dir="rtl"] .auth-field select { text-align: right; }
.auth-field input:focus,
.auth-field select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.auth-field input::placeholder { color: var(--gray); }
.auth-field select option { background: var(--bg-card); color: var(--text-main); }


.auth-terms {
  display: flex; align-items: flex-start; gap: 9px;
  font-size: 0.76rem; color: var(--gray);
  margin-bottom: 13px; line-height: 1.45;
}
.auth-terms input[type="checkbox"] {
  margin-top: 2px; flex-shrink: 0;
  width: 15px; height: 15px;
  accent-color: var(--primary);
  padding: 0; border-radius: 4px;
}
.auth-terms a { color: var(--primary); font-weight: 600; }


.auth-btn {
  width: 100%; padding: 11px;
  background: var(--primary); color: #fff;
  border: none; border-radius: 40px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem; font-weight: 700; cursor: pointer;
  box-shadow: var(--shadow-md);
  display: flex; align-items: center; justify-content: center; gap: 7px;
  margin-bottom: 13px;
}
.auth-btn:hover { opacity: 0.92;background: var(--primary); }

.auth-divider {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 11px;
}
.auth-divider::before, .auth-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.auth-divider span { font-size: 0.72rem; color: var(--gray); white-space: nowrap; }


.auth-social {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 13px;
}
.auth-social-btn {
  display: flex; align-items: center; justify-content: center; gap: 7px;
  padding: 9px 10px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  background: var(--bg-card);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem; font-weight: 600; cursor: pointer;
}
.auth-social-btn:hover { border-color: var(--border-a); }
.auth-social-btn.google:hover { border-color: #4285F4; }
.auth-social-btn.apple:hover  { border-color: var(--ink); }
.g-logo { width: 15px; height: 15px; flex-shrink: 0; }


.auth-switch { text-align: center; font-size: 0.82rem; color: var(--gray); }
.auth-switch a { color: var(--primary); font-weight: 600; cursor: pointer; }


@media (max-width: 639px) {
  .auth-card         { max-width: 100%; padding: 20px 16px 16px; border-radius: 18px; margin: 0 10px; }
  .auth-logo         { font-size: 1.2rem; }
  .auth-subtitle     { font-size: 0.74rem; margin-bottom: 7px; }
  .auth-perks        { gap: 5px; margin-bottom: 7px; }
  .perk-chip         { font-size: 0.65rem; padding: 3px 8px; }
  .auth-title        { font-size: 1.25rem; margin-bottom: 10px; }
  .auth-row          { grid-template-columns: 1fr; gap: 0; }
  .auth-field        { margin-bottom: 8px; }
  .auth-field label  { font-size: 0.72rem; margin-bottom: 3px; }
  .auth-field input,
  .auth-field select { padding: 9px 11px; font-size: 0.8rem; border-radius: 10px; }
  .auth-terms        { font-size: 0.7rem; margin-bottom: 9px; gap: 7px; }
  .auth-btn          { padding: 9px; font-size: 0.82rem; margin-bottom: 9px; }
  .auth-divider      { margin-bottom: 8px; }
  .auth-divider span { font-size: 0.68rem; }
  .auth-social       { grid-template-columns: 1fr; gap: 7px; margin-bottom: 9px; }
  .auth-switch       { font-size: 0.76rem; }
  .ctrl-row          { top: 10px; right: 10px; gap: 5px; }
  .theme-toggle, .rtl-toggle { width: 34px; height: 34px; }
  body[dir="rtl"] .ctrl-row { right: auto; left: 10px; }
}


@media (min-width: 640px) and (max-width: 1023px) {
  .auth-card         { max-width: 460px; padding: 28px 38px 24px; border-radius: 24px; }
  .auth-logo         { font-size: 1.35rem; }
  .auth-subtitle     { font-size: 0.78rem; margin-bottom: 9px; }
  .auth-perks        { gap: 7px; margin-bottom: 9px; }
  .perk-chip         { font-size: 0.68rem; padding: 4px 9px; }
  .auth-title        { font-size: 1.45rem; margin-bottom: 13px; }
  .auth-row          { grid-template-columns: 1fr 1fr; gap: 12px; }
  .auth-field        { margin-bottom: 10px; }
  .auth-field label  { font-size: 0.75rem; margin-bottom: 4px; }
  .auth-field input,
  .auth-field select { padding: 10px 13px; font-size: 0.84rem; border-radius: 11px; }
  .auth-terms        { font-size: 0.74rem; margin-bottom: 11px; }
  .auth-btn          { padding: 11px; font-size: 0.88rem; margin-bottom: 11px; }
  .auth-social       { grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 11px; }
  .auth-switch       { font-size: 0.8rem; }
  .ctrl-row          { top: 14px; right: 14px; gap: 7px; }
  .theme-toggle, .rtl-toggle { width: 38px; height: 38px; }
  body[dir="rtl"] .ctrl-row { right: auto; left: 14px; }
}


@media (min-width: 1024px) and (max-width: 1279px) {
  .auth-card          { max-width: 420px; padding: 20px 30px 18px; border-radius: 24px; }
  .auth-logo          { font-size: 1.25rem; margin-bottom: 2px; }
  .auth-subtitle      { font-size: 0.75rem; margin-bottom: 7px; }
  .auth-perks         { gap: 6px; margin-bottom: 7px; }
  .perk-chip          { font-size: 0.66rem; padding: 3px 9px; }
  .auth-title         { font-size: 1.35rem; margin-bottom: 10px; }
  .auth-row           { grid-template-columns: 1fr 1fr; gap: 10px; }
  .auth-field         { margin-bottom: 8px; }
  .auth-field label   { font-size: 0.72rem; margin-bottom: 3px; }
  .auth-field input,
  .auth-field select  { padding: 9px 11px; font-size: 0.8rem; border-radius: 10px; }
  .auth-terms         { font-size: 0.71rem; margin-bottom: 9px; gap: 8px; line-height: 1.4; }
  .auth-terms input[type="checkbox"] { width: 13px; height: 13px; }
  .auth-btn           { padding: 9px; font-size: 0.84rem; margin-bottom: 9px; }
  .auth-divider       { margin-bottom: 8px; }
  .auth-divider span  { font-size: 0.68rem; }
  .auth-social        { grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 9px; }
  .auth-social-btn    { padding: 7px 10px; font-size: 0.78rem; }
  .auth-switch        { font-size: 0.76rem; }
  .ctrl-row           { top: 14px; right: 14px; gap: 7px; }
  .theme-toggle, .rtl-toggle { width: 36px; height: 36px; }
  body[dir="rtl"] .ctrl-row { right: auto; left: 14px; }
}


@media (min-width: 1280px) {
  .auth-card         { max-width: 480px; padding: 32px 44px 28px; border-radius: 30px; }
  .auth-logo         { font-size: 1.55rem; margin-bottom: 5px; }
  .auth-subtitle     { font-size: 0.85rem; margin-bottom: 12px; }
  .auth-perks        { gap: 10px; margin-bottom: 12px; }
  .perk-chip         { font-size: 0.74rem; padding: 5px 12px; }
  .auth-title        { font-size: 1.75rem; margin-bottom: 18px; }
  .auth-row          { grid-template-columns: 1fr 1fr; gap: 14px; }
  .auth-field        { margin-bottom: 14px; }
  .auth-field label  { font-size: 0.8rem; margin-bottom: 6px; }
  .auth-field input,
  .auth-field select { padding: 12px 15px; font-size: 0.9rem; border-radius: 13px; }
  .auth-terms        { font-size: 0.8rem; margin-bottom: 16px; gap: 10px; }
  .auth-btn          { padding: 13px; font-size: 0.96rem; margin-bottom: 16px; }
  .auth-divider      { margin-bottom: 14px; }
  .auth-divider span { font-size: 0.76rem; }
  .auth-social       { gap: 12px; margin-bottom: 16px; }
  .auth-switch       { font-size: 0.86rem; }
  .ctrl-row          { top: 20px; right: 20px; gap: 10px; }
  .theme-toggle, .rtl-toggle { width: 44px; height: 44px; }
  body[dir="rtl"] .ctrl-row { right: auto; left: 20px; }
}
</style>
</head>
<body>


<div class="ctrl-row">
  <button class="rtl-toggle" id="rtlToggle" onclick="toggleRTL()" title="Toggle RTL/LTR"><span id="rtlLabel">RTL</span></button>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme"><i class="fa-solid fa-sun" id="themeIcon"></i></button>
</div>

<div class="auth-page">
  <div class="auth-card">

    <a href="index.html" class="auth-logo">Speak<span>Easy</span></a>
    <p class="auth-subtitle">Start your language journey today — it's free!</p>

   

    <h2 class="auth-title">Create Account</h2>

    <div class="auth-row">
      <div class="auth-field">
        <label>First Name</label>
        <input type="text" placeholder="First Name"/>
      </div>
      <div class="auth-field">
        <label>Last Name</label>
        <input type="text" placeholder="Last Name"/>
      </div>
    </div>

    <div class="auth-field">
      <label>Email Address</label>
      <input type="email" placeholder="you@example.com"/>
    </div>

    <div class="auth-field">
      <label>Password</label>
      <input type="password" placeholder="Create a strong password"/>
    </div>

    <div class="auth-field">
      <label>I want to learn</label>
      <select>
        <option value="">Choose a language…</option>
        <option>🇪🇸 Spanish</option>
        <option>🇫🇷 French</option>
        <option>🇯🇵 Japanese</option>
        <option>🇩🇪 German</option>
        <option>🇸🇦 Arabic</option>
        <option>🇮🇹 Italian</option>
        <option>🇧🇷 Portuguese</option>
        <option>🇨🇳 Mandarin</option>
      </select>
    </div>

    <div class="auth-terms">
      <input type="checkbox" id="terms"/>
      <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>. I'm happy to receive learning tips by email.</label>
    </div>

    <button class="auth-btn">
      <i class="fas fa-rocket"></i> Start Learning Free
    </button>

    <div class="auth-divider"><span>or sign up with</span></div>

    <div class="auth-social">
      <button class="auth-social-btn google" onclick="socialLogin('Google')">
        <svg class="g-logo" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.017 17.64 11.71 17.64 9.2z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Google
      </button>
       <button class="auth-social-btn apple" onclick="socialLogin('Apple')">
        <svg width="16" height="16" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;" aria-hidden="true" fill="currentColor">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
        </svg>
        Apple
      </button>
    </div>

    <p class="auth-switch">
      Already have an account? <a href="login.html">Sign in</a>
    </p>

  </div>
</div>

<script>
/* ── THEME ── (same pattern as dashboard.html) */
let dark = false;
function applyTheme(d) {
  const icon = document.getElementById('themeIcon');
  document.body.classList.toggle('dark', d);
  if (icon) icon.className = d ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
}
function toggleTheme() {
  dark = !dark;
  applyTheme(dark);
  try { localStorage.setItem('speakeasy-theme', dark ? 'dark' : 'light'); } catch(e) {}
}
(function() {
  let s = null;
  try { s = localStorage.getItem('speakeasy-theme'); } catch(e) {}
  if (!s) s = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  dark = s === 'dark';
  applyTheme(dark);
})();

/* ── RTL ── (same pattern as dashboard.html) */
let rtlOn = false;
function toggleRTL() {
  rtlOn = !rtlOn;
  document.documentElement.dir = rtlOn ? 'rtl' : 'ltr';
  document.body.setAttribute('dir', rtlOn ? 'rtl' : 'ltr');
  const lbl = document.getElementById('rtlLabel');
  if (lbl) lbl.textContent = rtlOn ? 'LTR' : 'RTL';
  try { localStorage.setItem('speakeasy-rtl', rtlOn ? 'rtl' : 'ltr'); } catch(e) {}
}
(function() {
  let r = null;
  try { r = localStorage.getItem('speakeasy-rtl'); } catch(e) {}
  if (r === 'rtl') {
    rtlOn = true;
    document.documentElement.dir = 'rtl';
    document.body.setAttribute('dir', 'rtl');
    const lbl = document.getElementById('rtlLabel');
    if (lbl) lbl.textContent = 'LTR';
  }
})();

window.socialLogin = function (provider) {
  alert('Redirecting to ' + provider + ' OAuth…\n(Wire up your handler here.)');
};
</script>
</body>
</html>
